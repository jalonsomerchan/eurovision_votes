name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ASTRO_SITE: https://eurovision2026.alon.one
  ASTRO_BASE: /

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    env:
      FIREBASE: ${{ vars.FIREBASE || secrets.FIREBASE }}
      PUBLIC_FIREBASE_API_KEY: ${{ vars.PUBLIC_FIREBASE_API_KEY || secrets.PUBLIC_FIREBASE_API_KEY }}
      PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ vars.PUBLIC_FIREBASE_AUTH_DOMAIN || secrets.PUBLIC_FIREBASE_AUTH_DOMAIN }}
      PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.PUBLIC_FIREBASE_PROJECT_ID || secrets.PUBLIC_FIREBASE_PROJECT_ID }}
      PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.PUBLIC_FIREBASE_STORAGE_BUCKET || secrets.PUBLIC_FIREBASE_STORAGE_BUCKET }}
      PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.PUBLIC_FIREBASE_MESSAGING_SENDER_ID || secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      PUBLIC_FIREBASE_APP_ID: ${{ vars.PUBLIC_FIREBASE_APP_ID || secrets.PUBLIC_FIREBASE_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Import Firebase dotenv config
        shell: bash
        run: |
          if [ -n "$FIREBASE" ]; then
            printf '%s\n' "$FIREBASE" | tr -d '\r' | while IFS= read -r line; do
              [ -z "$line" ] && continue
              case "$line" in \#*) continue ;; esac
              name="${line%%=*}"
              value="${line#*=}"
              name="$(printf '%s' "$name" | tr -d '\r' | xargs)"
              value="$(printf '%s' "$value" | tr -d '\r' | sed -e 's/^\"//' -e 's/\"$//' | xargs)"

              case "$name" in
                PUBLIC_FIREBASE_API_KEY|PUBLIC_FIREBASE_AUTH_DOMAIN|PUBLIC_FIREBASE_PROJECT_ID|PUBLIC_FIREBASE_STORAGE_BUCKET|PUBLIC_FIREBASE_MESSAGING_SENDER_ID|PUBLIC_FIREBASE_APP_ID)
                  printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
                  ;;
              esac
            done
          fi

      - name: Sanitize Firebase env values
        shell: bash
        run: |
          for name in PUBLIC_FIREBASE_API_KEY PUBLIC_FIREBASE_AUTH_DOMAIN PUBLIC_FIREBASE_PROJECT_ID PUBLIC_FIREBASE_STORAGE_BUCKET PUBLIC_FIREBASE_MESSAGING_SENDER_ID PUBLIC_FIREBASE_APP_ID; do
            value="${!name}"
            value="$(printf '%s' "$value" | tr -d '\r' | sed -e 's/^\"//' -e 's/\"$//' | xargs)"
            printf '%s=%s\n' "$name" "$value" >> "$GITHUB_ENV"
          done

      - name: Check Firebase config
        shell: bash
        run: |
          required_vars=(PUBLIC_FIREBASE_API_KEY PUBLIC_FIREBASE_PROJECT_ID PUBLIC_FIREBASE_APP_ID)
          optional_vars=(PUBLIC_FIREBASE_AUTH_DOMAIN PUBLIC_FIREBASE_STORAGE_BUCKET PUBLIC_FIREBASE_MESSAGING_SENDER_ID)
          missing_required=0

          for name in "${required_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::error title=Firebase sin configurar::$name no está definido como variable o secret de GitHub."
              missing_required=1
            fi
          done

          for name in "${optional_vars[@]}"; do
            if [ -z "${!name}" ]; then
              echo "::warning title=Firebase incompleto::$name no está definido. Revisa la configuración de tu app web de Firebase."
            fi
          done

          if [ "$missing_required" -eq 1 ]; then
            echo "Configura las variables PUBLIC_FIREBASE_* por separado o una variable FIREBASE con formato .env en Settings > Secrets and variables > Actions y vuelve a ejecutar el deploy."
            exit 1
          fi

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
